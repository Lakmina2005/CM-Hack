<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-M SECURE LOGIN</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            border: 2px solid #00ff41;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 25px #00ff41;
            background: rgba(0, 20, 0, 0.9);
            border-radius: 15px;
        }
        h2 { text-shadow: 0 0 10px #00ff41; margin-bottom: 25px; }
        input {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px;
            font-size: 20px;
            text-align: center;
            width: 150px;
            outline: none;
            border-radius: 5px;
        }
        .btn {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 12px 30px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
            border-radius: 5px;
        }
        .btn:hover { background: #00cc33; box-shadow: 0 0 15px #00ff41; }
        #error { color: red; margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>[ ACCESS RESTRICTED ]</h2>
    <p>ENTER SECURITY CODE</p>
    <input type="password" id="passInput" maxlength="4" placeholder="****">
    <br>
    <button class="btn" onclick="checkPass()">AUTHORIZE</button>
    <p id="error">ACCESS DENIED: INVALID CODE</p>
</div>

<script>
    function checkPass() {
        const pass = document.getElementById('passInput').value;
        const error = document.getElementById('error');
        
        if (pass === "9292") {
            // පාස්වර්ඩ් එක හරි නම් 1.html එකට යන්න
            window.location.href = "1.html";
        } else {
            // වැරදි නම් error එක පෙන්වන්න
            error.style.display = "block";
            document.getElementById('passInput').value = "";
        }
    }

    // Enter key එක එබුවම ලොග් වෙන්න
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkPass();
        }
    });
</script>

</body>
</html>
